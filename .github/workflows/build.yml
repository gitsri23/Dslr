name: Build Portrait Blur APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Download MediaPipe Segmenter Model
        run: |
          mkdir -p app/src/main/assets
          wget -qO app/src/main/assets/selfie_segmenter.tflite https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite

      - name: Create Missing Env File & Keystore
        run: |
          touch .env.example
          touch local.properties
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      - name: Generate Missing Android Resources & PNG Launcher Icons
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # 1. Standard structural XML definitions
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Portrait Blur</string>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.MyApplication" parent="android:Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/xml/backup_rules.xml
          <?xml version="1.0" encoding="utf-8"?><full-backup-content><include domain="sharedpref" path="."/></full-backup-content>
          EOF

          cat << 'EOF' > app/src/main/res/xml/data_extraction_rules.xml
          <?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup><include domain="sharedpref" path="."/></cloud-backup><device-transfer><include domain="sharedpref" path="."/></device-transfer></data-extraction-rules>
          EOF

          # 2. FIX: Standard clean drawing operations without variable leaks
          cat << 'EOF' > GenerateIcon.java
          import java.awt.*;
          import java.awt.image.BufferedImage;
          import java.io.File;
          import javax.imageio.ImageIO;

          public class GenerateIcon {
              public static void main(String[] args) throws Exception {
                  int[] sizes = {72, 96, 144, 192};
                  String[] paths = {"hdpi", "xhdpi", "xxhdpi", "xxxhdpi"};
                  for(int i=0; i<sizes.length; i++) {
                      int size = sizes[i];
                      BufferedImage img = new BufferedImage(size, size, BufferedImage.TYPE_INT_ARGB);
                      Graphics2D g = img.createGraphics();
                      g.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON);
                      
                      // Background Solid Custom Matrix
                      g.setColor(new Color(25, 25, 28));
                      g.fillOval(0, 0, size, size);
                      
                      // Cinematic Target Camera Shutter Inner Ring
                      g.setColor(Color.YELLOW);
                      g.setStroke(new BasicStroke(size / 14f));
                      g.drawOval(size/4, size/4, size/2, size/2);
                      
                      g.dispose();
                      ImageIO.write(img, "png", new File("app/src/main/res/mipmap-" + paths[i] + "/ic_launcher.png"));
                      ImageIO.write(img, "png", new File("app/src/main/res/mipmap-" + paths[i] + "/ic_launcher_round.png"));
                  }
              }
          }
          EOF
          javac GenerateIcon.java && java GenerateIcon

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Compile Debug APK
        run: ./gradlew assembleDebug

      - name: Push APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Portrait Blur Camera v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
