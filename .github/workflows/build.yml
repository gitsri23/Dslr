name: Build Portrait Blur APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Download MediaPipe Segmenter Model
        run: |
          mkdir -p app/src/main/assets
          wget -qO app/src/main/assets/selfie_segmenter.tflite https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite

      - name: Create Missing Env File
        run: |
          touch .env.example
          touch local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # ─── 🛠️ FIX: Updated Gradle Wrapper version to 9.3.1 ───
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Compile Release APK
        run: ./gradlew assembleRelease

      - name: Push APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Portrait Blur Camera v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
