name: Build Portrait Blur APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Download MediaPipe Segmenter Model
        run: |
          mkdir -p app/src/main/assets
          wget -qO app/src/main/assets/selfie_segmenter.tflite https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite

      - name: Create Missing Env File
        run: |
          touch .env.example
          touch local.properties

      - name: Generate Missing Android Resources
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Portrait Blur</string>
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.MyApplication" parent="android:Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat << 'EOF' > app/src/main/res/xml/backup_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="sharedpref" path="."/>
          </full-backup-content>
          EOF

          cat << 'EOF' > app/src/main/res/xml/data_extraction_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup><include domain="sharedpref" path="."/></cloud-backup>
              <device-transfer><include domain="sharedpref" path="."/></device-transfer>
          </data-extraction-rules>
          EOF

          cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/>
              <foreground android:drawable="@android:color/white"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      # ─── 🛠️ FIX: Changed assembleRelease to assembleDebug ───
      - name: Compile Debug APK
        run: ./gradlew assembleDebug

      - name: Push APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Portrait Blur Camera v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
